<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕打点工具</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background: #f5f5f5; }
  h2 { margin: 20px 0 10px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tabs button { padding: 8px 20px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .tabs button.active { background: #8B2252; color: #fff; border-color: #8B2252; }
  video { width: 100%; border-radius: 8px; background: #000; }
  .instructions { background: #fff3cd; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 14px; line-height: 1.6; }
  .instructions b { color: #8B2252; }
  .btn-row { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
  .btn-row button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 13px; }
  .btn-row button:hover { background: #f0f0f0; }
  .btn-export { background: #4CAF50 !important; color: #fff !important; border-color: #4CAF50 !important; font-weight: bold; }
  .btn-export:hover { background: #45a049 !important; }
  .btn-export:disabled { background: #ccc !important; border-color: #ccc !important; cursor: not-allowed; }
  #counter { font-size: 18px; font-weight: bold; color: #8B2252; margin: 10px 0; }

  .sentence-list { margin: 10px 0; }
  .sent-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px;
    background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 4px;
    font-size: 13px; line-height: 1.6; transition: all 0.2s;
  }
  .sent-row.done { background: #e8f5e9; border-color: #a5d6a7; }
  .sent-row.current { background: #fff8e1; border-color: #ffe082; box-shadow: 0 0 0 2px #ffd54f; }
  .sent-row.future { opacity: 0.5; }
  .sent-num { font-weight: bold; color: #8B2252; min-width: 28px; flex-shrink: 0; }
  .sent-time { font-family: monospace; color: #666; min-width: 100px; flex-shrink: 0; font-size: 12px; }
  .sent-text { flex: 1; }
  .sent-kr { font-weight: 500; }
  .sent-cn { color: #888; font-size: 12px; }

  #jsonOutput {
    background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px;
    margin: 10px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap;
    max-height: 300px; overflow-y: auto; display: none;
  }
  .status-bar { background: #e8f5e9; padding: 10px 14px; border-radius: 8px; margin: 10px 0; font-size: 14px; color: #2e7d32; display: none; }
</style>
</head>
<body>
  <h2>字幕打点工具</h2>
  <div class="instructions">
    <b>使用方法：</b><br>
    1. 选择 EP → 自动加载该 EP 的字幕文本和视频<br>
    2. 点击播放视频<br>
    3. 每当一句新字幕开始时，按 <b>空格键</b> 打点（自动匹配到下一句）<br>
    4. 按 <b>Z 键</b> 撤销上一个打点<br>
    5. 打完后点 <b>"导出JSON并下载"</b>，把文件放到 <code>data/</code> 目录覆盖即可<br>
    <b>录屏版会自动读取最新 JSON，无需其他操作！</b>
  </div>

  <div class="tabs" id="epTabs"></div>

  <video id="player" controls playsinline>
    <source id="videoSrc" src="" type="video/mp4">
  </video>

  <div id="counter">已打 0 / 0 个点</div>

  <div class="btn-row">
    <button onclick="markTime()">打点 (空格)</button>
    <button onclick="undoLast()">撤销 (Z)</button>
    <button onclick="clearAll()">清空</button>
    <button class="btn-export" id="btnExport" onclick="exportJson()" disabled>导出JSON并下载</button>
  </div>

  <div class="sentence-list" id="sentenceList"></div>
  <div class="status-bar" id="statusBar"></div>
  <div id="jsonOutput"></div>

  <script>
    // ===== EP 配置 =====
    // 每个 EP 的字幕文本在这里配置，打点工具会自动匹配
    var epConfig = {
      1: {
        title: 'EP1 职场邮件怎么写',
        video: 'media/ep1_video.mp4',
        file: 'ep1.json',
        sentences: [
          { kr: '<span class="hl-blue">요청</span> 메일은 그냥 쓰지 마세요.', cn: '请不要随便写请求邮件。' },
          { kr: '요청 메일은 그냥 쓰는게 절대 아닙니다.', cn: '随便写请求邮件是绝对不行的。' },
          { kr: '첫 번째, 회신기간은 분명하게 써주고', cn: '首先，要写清楚截止期限，' },
          { kr: '<span class="hl-green">하이라이트</span><span class="hl-purple">까지</span> 해줍니다.', cn: '甚至还要加亮它。' },
          { kr: '두 번째는 제목에 [회신필요]라는 문구랑 회신기한을 써주세요.', cn: '第二，在邮件标题写上[需要回复]和截止期限。' },
          { kr: '세 번째는 이건 진짜 <span class="hl-orange">치트키</span>인데', cn: '第三，这招真的是作弊器，' },
          { kr: '참조(CC)에 상대방 팀장님을 <span class="hl-red">걸어주세요</span>.', cn: '在CC里挂上对方组长。' },
          { kr: '네 번째 빨리 줘야 하는 이유를 써주세요.', cn: '第四，写上需要尽快回复的理由。' },
          { kr: '예를 들면 부사장 보고가 될 예정이다.', cn: '比如说，这是要给副社长看的报告。' },
          { kr: '뭐 이런 말들을 써주는 거죠.', cn: '就是写上这类话就行了。' },
          { kr: '다섯 번째, 마감일 전일 또는 당일에', cn: '第五，截止日前一天或当天' },
          { kr: '리마인드 메일을 한 번 더 보내주시고', cn: '再发一次提醒邮件，' },
          { kr: '회신이 <span class="hl-teal">부진하</span><span class="hl-purple">다면</span> <span class="hl-red">전화를 한 번 돌립니다</span>.', cn: '回复不积极的话就打个电话。' }
        ]
      },
      2: {
        title: 'EP2 月刊韩国·济州岛之旅',
        video: 'media/ep2_video.mp4',
        file: 'ep2.json',
        sentences: [
          { kr: '<span class="hl-blue">한 달</span>에 한 군데 <span class="hl-green">국내 여행</span>을 <span class="hl-red">떠나기로</span> 한 월간한국 프로젝트', cn: '每个月去一个地方国内旅行的"月刊韩国"企划' },
          { kr: '1월에는 <span class="hl-orange">수원</span>에서 <span class="hl-red">먹고 먹고 먹고 먹는</span>!', cn: '一月份在水原吃吃吃吃！' },
          { kr: '<span class="hl-purple">먹방</span> 여행을 <span class="hl-teal">다녀왔었는데요</span>', cn: '来了一趟吃播之旅' },
          { kr: '오늘은 <span class="hl-purple">무려</span> <span class="hl-blue">비행기</span>를 타고 있습니다', cn: '今天居然坐上飞机了' },
          { kr: '월간한국 프로젝트 그 <span class="hl-orange">두 번째</span> <span class="hl-green">여행지</span>는', cn: '月刊韩国企划的第二个旅行目的地呢' },
          { kr: '대한민국에서 <span class="hl-red">가장 큰</span> <span class="hl-teal">섬</span>이자', cn: '是韩国最大的岛' },
          { kr: '많은 한국인들이 <span class="hl-purple">사랑하는</span> <span class="hl-blue">제주도</span>입니다', cn: '也是很多韩国人都超爱的济州岛' }
        ]
      },
      3: {
        title: 'EP3 洪济川瀑布广场',
        video: 'media/ep3_video.mp4',
        file: 'ep3.json',
        sentences: [
          { kr: '세 번째는 홍제천 폭포마당입니다. 홍제천 폭포마당은 서울특별시 서대문구 연희동 170-181로 찾아가시면 됩니다.', cn: '第三个是洪济川瀑布广场。地址在首尔市西大门区延禧洞170-181，直接导航过去就行。' },
          { kr: '이곳은 제가 소개해 드린 적이 있는 곳인데요, 홍제천을 따라 조성된 인공폭포입니다. 홍제천은 북한산에서 발원하여 종로구, 서대문구, 마포구를 흘러 한강으로 통하는 하천인데, 홍제천 인공폭포는 그중에서도 백련교 하류에 있습니다.', cn: '这个地方呢我之前其实介绍过，是沿着洪济川建造的一个人工瀑布。洪济川是从北汉山发源，经过钟路区、西大门区、麻浦区最后汇入汉江的一条河，而人工瀑布就在其中的白莲桥下游。' },
          { kr: '이곳에서 안산 방향으로 올라갈 수도 있기도 하고요. 홍제천 폭포마당에는 폭포뿐만 아니라 다양한 쉼터가 조성되어 시민들의 휴식처가 되어 주고 있는데,', cn: '从这儿还能往鞍山方向爬上去。瀑布广场不光有瀑布，还建了各种休息区，是市民们休闲放松的好去处。' },
          { kr: '정겨운 징검다리를 건너면 시원한 물살과 함께 더위마저 흘러가 버리는 기분을 느낄 수 있습니다.', cn: '走过那条亲切的踏石桥，感受着清凉的水流，连暑气都好像被冲走了一样。' },
          { kr: '그리고 홍제천 폭포마당 바로 앞에는 카페 폭포가 있는데, 이곳에서 시원시원하게 쏟아지는 홍제천 인공폭포를 감상할 수 있습니다.', cn: '然后就在瀑布广场正前方有一家叫카페 폭포的咖啡厅，在那儿可以痛快地欣赏洪济川人工瀑布哗哗地倾泻而下。' },
          { kr: '카페 폭포에서 보는 폭포의 모습은 크기가 꽤 크고 자연 절벽에서 흘러 실제 폭포를 보는 것 같이 장관인데요, 이 카페는 상업공간이 아니라 서대문구에서 운영하는 카페인데요, 수익금은 관내 대학 장학금으로 사용되고 있기도 합니다.', cn: '从咖啡厅看过去瀑布还挺大的，顺着天然岩壁流下来，真的跟看真正的瀑布一样壮观。而且这家咖啡厅不是商业经营的，是西大门区运营的，收入还会用来给区里的大学生发奖学金。' },
          { kr: '여름에 시원시원하게 쏟아지는 폭포를 보면서 힐링할 수 있는 홍제천 폭포마당에도 꼭 가보시기 바랍니다.', cn: '夏天能一边看着瀑布哗哗地流一边治愈身心的洪济川瀑布广场，大家一定要去看看。' }
        ]
      }
    };

    var player = document.getElementById('player');
    var marks = [];
    var currentEp = 1;

    // 动态生成 tabs
    var tabsEl = document.getElementById('epTabs');
    Object.keys(epConfig).forEach(function(epId) {
      var btn = document.createElement('button');
      btn.textContent = epConfig[epId].title;
      btn.className = parseInt(epId) === 1 ? 'active' : '';
      btn.addEventListener('click', function() { switchEp(parseInt(epId)); });
      tabsEl.appendChild(btn);
    });

    function switchEp(ep) {
      currentEp = ep;
      tabsEl.querySelectorAll('button').forEach(function(b, i) {
        b.classList.toggle('active', i === ep - 1);
      });
      player.pause();
      document.getElementById('videoSrc').src = epConfig[ep].video;
      player.load();
      marks = [];
      render();
    }

    function stripHtml(html) {
      var tmp = document.createElement('span');
      tmp.innerHTML = html;
      return tmp.textContent;
    }

    function markTime() {
      var sents = epConfig[currentEp].sentences;
      if (marks.length >= sents.length) return; // 已打完
      marks.push(player.currentTime);
      render();
      // 自动滚动到当前句
      var currentRow = document.querySelector('.sent-row.current');
      if (currentRow) currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function undoLast() {
      marks.pop();
      render();
    }

    function clearAll() {
      marks = [];
      render();
    }

    function render() {
      var sents = epConfig[currentEp].sentences;
      var total = sents.length;
      var done = marks.length;

      document.getElementById('counter').textContent = '已打 ' + done + ' / ' + total + ' 个点';
      document.getElementById('btnExport').disabled = (done < total);

      var html = '';
      for (var i = 0; i < total; i++) {
        var cls = 'sent-row';
        var timeStr = '';
        if (i < done) {
          cls += ' done';
          var start = marks[i].toFixed(1);
          var end = (i < done - 1) ? marks[i + 1].toFixed(1) : (i === total - 1 ? '末尾' : '...');
          timeStr = start + ' → ' + end;
        } else if (i === done) {
          cls += ' current';
          timeStr = '⏎ 下一个打点';
        } else {
          cls += ' future';
        }
        html += '<div class="' + cls + '">' +
          '<div class="sent-num">' + (i + 1) + '</div>' +
          '<div class="sent-time">' + timeStr + '</div>' +
          '<div class="sent-text"><div class="sent-kr">' + stripHtml(sents[i].kr) + '</div>' +
          '<div class="sent-cn">' + sents[i].cn + '</div></div></div>';
      }
      document.getElementById('sentenceList').innerHTML = html;

      // 隐藏之前的导出结果
      document.getElementById('jsonOutput').style.display = 'none';
      document.getElementById('statusBar').style.display = 'none';
    }

    function buildJson() {
      var sents = epConfig[currentEp].sentences;
      var subtitles = [];
      for (var i = 0; i < sents.length; i++) {
        var start = parseFloat(marks[i].toFixed(1));
        var end = (i < sents.length - 1) ? parseFloat(marks[i + 1].toFixed(1)) : parseFloat((marks[i] + 10).toFixed(1));
        subtitles.push({
          start: start,
          end: end,
          kr: sents[i].kr,
          cn: sents[i].cn
        });
      }
      return {
        title: epConfig[currentEp].title,
        subtitles: subtitles
      };
    }

    function exportJson() {
      var data = buildJson();
      var jsonStr = JSON.stringify(data, null, 2);
      var filename = epConfig[currentEp].file;

      // 下载文件
      var blob = new Blob([jsonStr], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

      // 显示结果
      document.getElementById('jsonOutput').textContent = jsonStr;
      document.getElementById('jsonOutput').style.display = 'block';

      var statusBar = document.getElementById('statusBar');
      statusBar.innerHTML = '✅ 已下载 <b>' + filename + '</b>，把它放到 <code>data/</code> 目录覆盖同名文件，录屏版刷新即生效！';
      statusBar.style.display = 'block';
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        markTime();
      }
      if (e.code === 'KeyZ' && !e.metaKey && !e.ctrlKey) {
        undoLast();
      }
    });

    // 初始渲染
    switchEp(1);
  </script>
</body>
</html>
