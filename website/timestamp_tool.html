<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕打点工具</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background: #f5f5f5; }
  h2 { margin: 20px 0 10px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tabs button { padding: 8px 20px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; position: relative; }
  .tabs button.active { background: #8B2252; color: #fff; border-color: #8B2252; }
  .tabs button .badge { position: absolute; top: -6px; right: -6px; background: #4CAF50; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 8px; }
  .tabs button .badge.partial { background: #FF9800; }
  video { width: 100%; border-radius: 8px; background: #000; }
  .instructions { background: #fff3cd; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 14px; line-height: 1.6; }
  .instructions b { color: #8B2252; }
  .btn-row { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
  .btn-row button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 13px; }
  .btn-row button:hover { background: #f0f0f0; }
  .btn-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row button:disabled:hover { background: #fff; }
  .btn-reopen { background: #FF9800 !important; color: #fff !important; border-color: #FF9800 !important; font-weight: bold; }
  .btn-reopen:hover { background: #F57C00 !important; }
  #counter { font-size: 18px; font-weight: bold; color: #8B2252; margin: 10px 0; }

  .sentence-list { margin: 10px 0; }
  .sent-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px;
    background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 4px;
    font-size: 13px; line-height: 1.6; transition: all 0.2s;
  }
  .sent-row.done { background: #e8f5e9; border-color: #a5d6a7; }
  .sent-row.current { background: #fff8e1; border-color: #ffe082; box-shadow: 0 0 0 2px #ffd54f; }
  .sent-row.future { opacity: 0.5; }
  .sent-num { font-weight: bold; color: #8B2252; min-width: 28px; flex-shrink: 0; }
  .sent-time { font-family: monospace; color: #666; min-width: 100px; flex-shrink: 0; font-size: 12px; }
  .sent-text { flex: 1; }
  .sent-kr { font-weight: 500; }
  .sent-cn { color: #888; font-size: 12px; }

  .locked-banner { background: #e8f5e9; border: 2px solid #4CAF50; border-radius: 8px; padding: 14px 18px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; }
  .locked-banner .locked-text { font-size: 15px; font-weight: bold; color: #2e7d32; }
  .locked-banner .locked-sub { font-size: 12px; color: #666; margin-top: 2px; }

  .status-bar { background: #e8f5e9; padding: 10px 14px; border-radius: 8px; margin: 10px 0; font-size: 14px; color: #2e7d32; display: none; }
</style>
</head>
<body>
  <h2>字幕打点工具</h2>
  <div class="instructions">
    <b>使用方法：</b><br>
    1. 选择 EP → 自动加载该 EP 的字幕文本和视频<br>
    2. 点击播放视频<br>
    3. 每当一句新字幕开始时，按 <b>空格键</b> 打点（自动匹配到下一句）<br>
    4. 按 <b>Z 键</b> 撤销上一个打点<br>
    5. 进度自动保存到浏览器本地，<b>刷新页面或关闭浏览器都不会丢失</b>
  </div>

  <div class="tabs" id="epTabs"></div>

  <video id="player" controls playsinline>
    <source id="videoSrc" src="" type="video/mp4">
  </video>

  <div id="counter">已打 0 / 0 个点</div>

  <div id="lockedBanner" class="locked-banner" style="display:none;">
    <div>
      <div class="locked-text">已完成打点</div>
      <div class="locked-sub">数据已锁定，解锁后可撤销/调整，不影响其他EP</div>
    </div>
    <button class="btn-reopen" onclick="unlockEp()">解锁编辑</button>
  </div>

  <div class="btn-row" id="editButtons">
    <button id="btnMark" onclick="markTime()">打点 (空格)</button>
    <button id="btnUndo" onclick="undoLast()">撤销 (Z)</button>
    <button id="btnClear" onclick="clearAll()">清空本EP</button>
  </div>

  <div class="sentence-list" id="sentenceList"></div>
  <div class="status-bar" id="statusBar"></div>

      11: {
        title: 'EP11 短发病',
        video: 'media/ep11_video.mp4',
        file: 'ep11.json',
        sentences: [
          { kr: '보통 <span class="hl-blue">장발</span>을 그냥 <span class="hl-blue">기르</span>고 있는 여자분들은 <span class="hl-orange">가끔가다가</span> <span class="hl-red">단발</span>도 괜찮지 않을까? 라는 <span class="hl-purple">고민</span>을 한다고 하더라고요', cn: '一般来说，留长发的女生，偶尔会想"是不是剪个短发也不错呢？"会有这样的烦恼' },

          { kr: '완전히 <span class="hl-teal">치료</span>가 된다 라고 이야기를 해요', cn: '才算完全被"治好"，大家都这么说' }

    var player = document.getElementById('player');
    var marks = [];
    var currentEp = 1;
    var locked = false;
    var STORAGE_KEY = 'timestamp_tool_marks';

    // ===== localStorage 持久化 =====
    function loadAllMarks() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : {};
      } catch (e) { return {}; }
    }

    function saveMarks() {
      var all = loadAllMarks();
      all[currentEp] = marks;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
      saveSubtitleData();
      updateTabBadges();
      showAutoSaveHint();
      // 打完自动锁定
      if (marks.length >= epConfig[currentEp].sentences.length) {
        locked = true;
        updateLockUI();
      }
    }

    var SUBTITLE_KEY = 'timestamp_tool_subtitles';
    function saveSubtitleData() {
      var sents = epConfig[currentEp].sentences;
      if (marks.length === 0) {
        try {
          var allSubs = JSON.parse(localStorage.getItem(SUBTITLE_KEY) || '{}');
          delete allSubs[currentEp];
          localStorage.setItem(SUBTITLE_KEY, JSON.stringify(allSubs));
        } catch(e) {}
        return;
      }
      var subtitles = [];
      for (var i = 0; i < marks.length; i++) {
        var start = parseFloat(marks[i].toFixed(1));
        var end = (i < marks.length - 1) ? parseFloat(marks[i + 1].toFixed(1)) : parseFloat((marks[i] + 10).toFixed(1));
        subtitles.push({ start: start, end: end, kr: sents[i].kr, cn: sents[i].cn });
      }
      try {
        var allSubs = JSON.parse(localStorage.getItem(SUBTITLE_KEY) || '{}');
        allSubs[currentEp] = { title: epConfig[currentEp].title, subtitles: subtitles };
        localStorage.setItem(SUBTITLE_KEY, JSON.stringify(allSubs));
      } catch(e) {}
    }

    function loadMarksForEp(ep) {
      var all = loadAllMarks();
      return all[ep] || [];
    }

    function clearMarksForEp(ep) {
      var all = loadAllMarks();
      delete all[ep];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
      updateTabBadges();
    }

    // ===== 锁定/解锁 UI =====
    function isEpComplete(ep) {
      var saved = loadMarksForEp(ep);
      return saved.length >= epConfig[ep].sentences.length;
    }

    function updateLockUI() {
      var banner = document.getElementById('lockedBanner');
      var editBtns = document.getElementById('editButtons');
      if (locked) {
        banner.style.display = 'flex';
        document.getElementById('btnMark').disabled = true;
        document.getElementById('btnUndo').disabled = true;
        document.getElementById('btnClear').disabled = true;
      } else {
        banner.style.display = 'none';
        document.getElementById('btnMark').disabled = false;
        document.getElementById('btnUndo').disabled = false;
        document.getElementById('btnClear').disabled = false;
      }
    }

    function unlockEp() {
      if (!confirm('确定要解锁 EP' + currentEp + ' 进行编辑吗？\n（数据不会清空，可以撤销/调整）')) return;
      locked = false;
      updateLockUI();
      render();
    }

    // ===== 自动保存提示 =====
    var saveHintTimer = null;
    function showAutoSaveHint() {
      var bar = document.getElementById('statusBar');
      bar.className = 'status-bar';
      bar.innerHTML = '已自动保存 (' + new Date().toLocaleTimeString() + ')';
      bar.style.display = 'block';
      clearTimeout(saveHintTimer);
      saveHintTimer = setTimeout(function() { bar.style.display = 'none'; }, 2000);
    }

    // ===== Tab 徽标 =====
    function updateTabBadges() {
      var all = loadAllMarks();
      var buttons = document.getElementById('epTabs').querySelectorAll('button');
      buttons.forEach(function(btn, i) {
        var ep = i + 1;
        var saved = all[ep] || [];
        var total = epConfig[ep].sentences.length;
        var existing = btn.querySelector('.badge');
        if (existing) existing.remove();
        if (saved.length > 0) {
          var badge = document.createElement('span');
          badge.className = saved.length >= total ? 'badge' : 'badge partial';
          badge.textContent = saved.length + '/' + total;
          btn.appendChild(badge);
        }
      });
    }

    // 动态生成 tabs
    var tabsEl = document.getElementById('epTabs');
    Object.keys(epConfig).forEach(function(epId) {
      var btn = document.createElement('button');
      btn.textContent = 'EP' + epId;
      btn.className = parseInt(epId) === 1 ? 'active' : '';
      btn.addEventListener('click', function() {
        var targetEp = parseInt(epId);
        if (targetEp === currentEp) return;
        var sents = epConfig[currentEp].sentences;
        if (!locked && marks.length > 0 && marks.length < sents.length) {
          if (!confirm('EP' + currentEp + ' 还有 ' + (sents.length - marks.length) + ' 句未打点，确定切换吗？\n（进度已自动保存，切回来可继续）')) return;
        }
        switchEp(targetEp);
      });
      tabsEl.appendChild(btn);
    });

    function switchEp(ep) {
      currentEp = ep;
      tabsEl.querySelectorAll('button').forEach(function(b, i) {
        b.classList.toggle('active', i === ep - 1);
      });
      player.pause();
      document.getElementById('videoSrc').src = epConfig[ep].video;
      player.load();
      marks = loadMarksForEp(ep);
      locked = isEpComplete(ep);
      updateLockUI();
      render();
    }

    function stripHtml(html) {
      var tmp = document.createElement('span');
      tmp.innerHTML = html;
      return tmp.textContent;
    }

    function markTime() {
      if (locked) return;
      var sents = epConfig[currentEp].sentences;
      if (marks.length >= sents.length) return;
      marks.push(player.currentTime);
      saveMarks();
      render();
      var currentRow = document.querySelector('.sent-row.current');
      if (currentRow) currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function undoLast() {
      if (locked) return;
      if (marks.length === 0) return;
      marks.pop();
      saveMarks();
      render();
    }

    function clearAll() {
      if (locked) return;
      if (marks.length === 0) return;
      if (!confirm('确定清空 EP' + currentEp + ' 的所有打点数据吗？')) return;
      marks = [];
      clearMarksForEp(currentEp);
      render();
    }

    function render() {
      var sents = epConfig[currentEp].sentences;
      var total = sents.length;
      var done = marks.length;

      var statusText = '已打 ' + done + ' / ' + total + ' 个点';
      if (locked) statusText += ' ✅ 已完成（已锁定）';
      else if (done >= total) statusText += ' ✅ 已完成';
      document.getElementById('counter').textContent = statusText;

      var html = '';
      for (var i = 0; i < total; i++) {
        var cls = 'sent-row';
        var timeStr = '';
        if (i < done) {
          cls += ' done';
          var start = marks[i].toFixed(1);
          var end = (i < done - 1) ? marks[i + 1].toFixed(1) : (i === total - 1 ? '末尾' : '...');
          timeStr = start + ' → ' + end;
        } else if (i === done && !locked) {
          cls += ' current';
          timeStr = '⏎ 下一个打点';
        } else {
          cls += ' future';
        }
        html += '<div class="' + cls + '">' +
          '<div class="sent-num">' + (i + 1) + '</div>' +
          '<div class="sent-time">' + timeStr + '</div>' +
          '<div class="sent-text"><div class="sent-kr">' + stripHtml(sents[i].kr) + '</div>' +
          '<div class="sent-cn">' + sents[i].cn + '</div></div></div>';
      }
      document.getElementById('sentenceList').innerHTML = html;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (locked) return;
      if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        markTime();
      }
      if (e.code === 'KeyZ' && !e.metaKey && !e.ctrlKey) {
        undoLast();
      }
    });

    // 初始渲染
    switchEp(1);
    updateTabBadges();
  </script>
