<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>养成地道韩语大脑</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
  <style>
    :root {
      --bg: #FAFBFD;
      --card: #FFFFFF;
      --text: #1a1a2e;
      --text-light: #6B7280;
      --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --border-light: rgba(229,231,235,0.5);
      --primary: #1B3A6B;
      --primary-light: rgba(27,58,107,0.08);
      --radius: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== Nav ===== */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(250,251,253,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
    }
    .nav-inner {
      max-width: 1280px; margin: 0 auto; padding: 0 20px;
      height: 56px; display: flex; align-items: center; gap: 10px;
    }
    .nav-flag { font-size: 20px; }
    .nav-title { font-weight: 700; font-size: 16px; color: var(--text); }

    /* ===== Hero ===== */
    .hero {
      max-width: 1280px; margin: 0 auto; padding: 48px 20px 32px;
      text-align: center;
    }
    .hero h1 {
      font-size: 2rem; font-weight: 800; color: var(--text);
      margin-bottom: 12px;
    }
    .hero .subtitle {
      font-size: 1.05rem; color: var(--text-light);
      margin-bottom: 16px;
    }
    .hero .method-tag {
      display: inline-block;
      padding: 6px 16px; border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary); font-size: 0.85rem; font-weight: 500;
    }

    /* ===== Filter Panel ===== */
    .filter-panel {
      max-width: 1280px; margin: 0 auto 32px; padding: 0 20px;
    }
    .filter-box {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      padding: 24px; box-shadow: var(--shadow);
    }
    .filter-section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .filter-divider {
      border: none; border-top: 1px solid rgba(229,231,235,0.3);
      margin: 20px 0;
    }

    /* Difficulty selector */
    .difficulty-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .diff-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card);
      cursor: pointer; font-size: 0.85rem; color: var(--text-light);
      transition: all 0.2s;
    }
    .diff-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .diff-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .diff-dots { display: flex; gap: 3px; }
    .diff-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: 0.6;
    }
    .diff-btn.active .diff-dot { opacity: 1; background: white; }

    /* Tag buttons */
    .tag-row {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    }
    .tag-row::-webkit-scrollbar { display: none; }
    .tag-btn {
      padding: 6px 16px; border-radius: 20px;
      border: none; cursor: pointer;
      font-size: 0.85rem; font-weight: 500; white-space: nowrap;
      background: #F3F4F6; color: var(--text-light);
      transition: all 0.2s;
    }
    .tag-btn:hover { background: var(--primary-light); color: var(--primary); }
    .tag-btn.active { background: var(--primary); color: white; box-shadow: var(--shadow); }

    /* ===== View Toggle + Count ===== */
    .content-area {
      max-width: 1280px; margin: 0 auto; padding: 0 20px 40px;
    }
    .content-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .content-count { font-size: 0.85rem; color: var(--text-muted); }
    .view-toggle {
      display: flex; align-items: center; gap: 4px;
      background: #F3F4F6; border-radius: 8px; padding: 4px;
    }
    .view-btn {
      padding: 6px 8px; border-radius: 6px;
      border: none; cursor: pointer; background: transparent;
      color: var(--text-muted); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .view-btn.active { background: var(--card); color: var(--primary); box-shadow: var(--shadow); }
    .view-btn svg { width: 16px; height: 16px; }

    /* ===== Lesson Cards - Grid ===== */
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .lesson-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      overflow: hidden; transition: all 0.25s;
      box-shadow: var(--shadow);
    }
    .lesson-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .card-thumb {
      position: relative; padding: 20px;
      min-height: 100px; display: flex; align-items: flex-start; justify-content: space-between;
    }
    .card-thumb .ep-icon { font-size: 2rem; }
    .card-thumb .ep-number {
      font-size: 2.5rem; font-weight: 800; color: rgba(255,255,255,0.2);
      line-height: 1; position: absolute; right: 16px; bottom: 12px;
    }
    .card-diff-dots {
      display: flex; gap: 4px; align-items: center;
    }
    .card-diff-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.7);
    }
    .card-diff-dot.filled { background: white; }

    .card-body { padding: 16px 20px 20px; }
    .card-tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .card-tag {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 4px;
    }
    .card-tag-green { background: #ECFDF5; color: #059669; }
    .card-tag-blue { background: #EFF6FF; color: #2563EB; }
    .card-tag-orange { background: #FFF7ED; color: #EA580C; }
    .card-tag-pink { background: #FDF2F8; color: #DB2777; }

    .card-body h3 {
      font-size: 1rem; font-weight: 700; margin-bottom: 4px;
      color: var(--text);
    }
    .card-body .card-desc {
      font-size: 0.82rem; color: var(--text-light);
      margin-bottom: 12px;
    }
    .card-vocab { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-vocab span {
      font-size: 0.7rem; padding: 3px 8px;
      background: #F9FAFB; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-light);
    }

    /* ===== Lesson Cards - List ===== */
    .lesson-list { display: flex; flex-direction: column; gap: 12px; }
    .lesson-card-list {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; transition: all 0.25s;
      box-shadow: var(--shadow);
    }
    .lesson-card-list:hover {
      box-shadow: var(--shadow-md);
    }
    .list-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .list-body { flex: 1; min-width: 0; }
    .list-body h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
    .list-body .card-desc { font-size: 0.8rem; color: var(--text-light); margin: 0; }
    .list-number {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ===== Tools Section ===== */
    .tools-section {
      max-width: 1280px; margin: 0 auto; padding: 0 20px 40px;
    }
    .tools-title {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tools-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .tool-card {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border-light);
      padding: 16px; display: flex; align-items: center; gap: 12px;
      transition: all 0.2s; box-shadow: var(--shadow);
    }
    .tool-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .tool-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .tool-card h4 { font-size: 0.85rem; font-weight: 600; }
    .tool-card p { font-size: 0.72rem; color: var(--text-muted); }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center; padding: 64px 20px; color: var(--text-muted);
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-state p:first-child { font-size: 1.1rem; }
    .empty-state p:last-child { font-size: 0.85rem; margin-top: 4px; }

    /* ===== Footer ===== */
    .footer {
      border-top: 1px solid var(--border-light);
      background: var(--card);
    }
    .footer-inner {
      max-width: 1280px; margin: 0 auto; padding: 40px 20px;
    }
    .footer-row {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    .footer-brand { display: flex; align-items: center; gap: 8px; }
    .footer-brand span:last-child { font-weight: 700; }
    .footer-slogan { font-size: 0.85rem; color: var(--text-muted); }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a {
      font-size: 0.85rem; color: var(--text-muted);
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--primary); }
    .footer-copy {
      text-align: center; font-size: 0.72rem;
      color: rgba(156,163,175,0.5); margin-top: 24px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .hero h1 { font-size: 1.5rem; }
      .lesson-grid { grid-template-columns: 1fr; }
      .footer-row { flex-direction: column; text-align: center; }
    }
  </style>
</head>

      {
        number: '09', icon: '😰', page: 'episode9.html',
        bg: 'linear-gradient(135deg, #BE185D 0%, #F472B6 100%)',
        difficulty: 3,
        tags: [{ label: '感悟', color: 'pink' }, { label: '유어셀린 YourCeline', color: 'blue' }],
        title: '上课怕被抽到',
        desc: '발표 공포증 극복기',
        vocab: ['발표하다 发言', '식은땀 冷汗', '두려워하다 害怕', '공포 恐惧']
      }
    ];

    // ===== State =====
    var activeTag = '全部';
    var activeDifficulty = null;
    var viewMode = 'grid';

    // ===== Render =====
    function getFiltered() {
      return lessons.filter(function(l) {
        if (activeDifficulty !== null && l.difficulty !== activeDifficulty) return false;
        if (activeTag !== '全部' && !l.tags.some(function(t) { return t.label === activeTag; })) return false;
        return true;
      });
    }

    function renderGrid(items) {
      return items.map(function(l) {
        var diffDots = '';
        for (var i = 0; i < 5; i++) {
          diffDots += '<span class="card-diff-dot' + (i < l.difficulty ? ' filled' : '') + '"></span>';
        }
        var tags = l.tags.map(function(t) {
          return '<span class="card-tag card-tag-' + t.color + '">' + t.label + '</span>';
        }).join('');
        var vocabs = l.vocab.map(function(v) {
          return '<span>' + v + '</span>';
        }).join('');

        return '<a href="' + l.page + '" class="lesson-card">' +
          '<div class="card-thumb" style="background:' + l.bg + '">' +
            '<span class="ep-icon">' + l.icon + '</span>' +
            '<div class="card-diff-dots">' + diffDots + '</div>' +
            '<span class="ep-number">' + l.number + '</span>' +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-tags-row">' + tags + '</div>' +
            '<h3>' + l.title + '</h3>' +
            '<p class="card-desc">' + l.desc + '</p>' +
            '<div class="card-vocab">' + vocabs + '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    function renderList(items) {
      return items.map(function(l) {
        return '<a href="' + l.page + '" class="lesson-card-list">' +
          '<div class="list-icon" style="background:' + l.bg + '">' + l.icon + '</div>' +
          '<div class="list-body">' +
            '<h3>' + l.title + '</h3>' +
            '<p class="card-desc">' + l.desc + '</p>' +
          '</div>' +
          '<span class="list-number">EP' + l.number + '</span>' +
        '</a>';
      }).join('');
    }

    function render() {
      var items = getFiltered();
      document.getElementById('contentCount').textContent = '共 ' + items.length + ' 期内容';
      document.getElementById('lessonGrid').innerHTML = renderGrid(items);
      document.getElementById('lessonList').innerHTML = renderList(items);
      document.getElementById('emptyState').className = 'empty-state' + (items.length === 0 ? ' show' : '');

      document.getElementById('lessonGrid').style.display = viewMode === 'grid' ? '' : 'none';
      document.getElementById('lessonList').style.display = viewMode === 'list' ? '' : 'none';
    }

    // ===== Events =====
    // Difficulty buttons
    document.getElementById('difficultyRow').addEventListener('click', function(e) {
      var btn = e.target.closest('.diff-btn');
      if (!btn) return;
      var level = parseInt(btn.dataset.level);
      activeDifficulty = activeDifficulty === level ? null : level;
      document.querySelectorAll('.diff-btn').forEach(function(b) {
        b.classList.toggle('active', parseInt(b.dataset.level) === activeDifficulty);
      });
      render();
    });

    // Tag buttons
    document.getElementById('tagRow').addEventListener('click', function(e) {
      var btn = e.target.closest('.tag-btn');
      if (!btn) return;
      activeTag = btn.dataset.tag;
      document.querySelectorAll('.tag-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tag === activeTag);
      });
      render();
    });

    // View toggle
    document.getElementById('btnGrid').addEventListener('click', function() {
      viewMode = 'grid';
      document.getElementById('btnGrid').classList.add('active');
      document.getElementById('btnList').classList.remove('active');
      render();
    });
    document.getElementById('btnList').addEventListener('click', function() {
      viewMode = 'list';
      document.getElementById('btnList').classList.add('active');
      document.getElementById('btnGrid').classList.remove('active');
      render();
    });

    // Initial render
    render();
  </script>

</body>
</html>
